<!doctype html>
<html lang="es">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IMU Live • 3D (cero al inicio)</title>
<style>
  body{margin:0;background:#0f1115;color:#eaeaea;font-family:system-ui,Segoe UI,Arial}
  header{padding:12px 16px;border-bottom:1px solid #212638}
  main{max-width:1200px;margin:0 auto;padding:16px;display:grid;gap:16px}
  .card{background:#151924;border:1px solid #212638;border-radius:12px;padding:16px}
  #scene{width:100%;height:520px;border-radius:10px;overflow:hidden}
  .mono{font-family:ui-monospace,Consolas,monospace}
  button{background:#2b3348;color:#fff;border:1px solid #39415a;border-radius:8px;padding:8px 12px;cursor:pointer}
  button:disabled{opacity:.6;cursor:not-allowed}
</style>

<header><h1 style="margin:0;font-size:18px">IMU Live • 3D</h1></header>
<main>
  <div class="card">
    <span>WebSocket: <b id="status">Conectando...</b></span>
    <button id="btnReset" style="margin-left:12px">Recentrar</button>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Orientación (Three.js)</h3>
    <div id="scene"></div>
    <div class="mono" id="euler" style="margin-top:8px">roll=0°, pitch=0°, yaw=0°</div>
    <div class="mono" id="q">quat: —</div>
  </div>
</main>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/controls/OrbitControls.js";

/* ====== Escena ====== */
const cont = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
cont.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1115);

const camera = new THREE.PerspectiveCamera(50, 16/9, 0.01, 50);
camera.position.set(1.6,1.1,1.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,0.06,0);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xffffff,0x202430,0.9));
const dir = new THREE.DirectionalLight(0xffffff,0.8); dir.position.set(2,3,2); scene.add(dir);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(6,6),
  new THREE.MeshStandardMaterial({ color:0x1b2030, roughness:1 })
);
ground.rotation.x = -Math.PI/2; scene.add(ground);
scene.add(new THREE.GridHelper(6, 30, 0x3a3f52, 0x252a38));

const box = new THREE.Mesh(
  new THREE.BoxGeometry(0.8,0.18,0.5),
  new THREE.MeshStandardMaterial({ metalness:0.2, roughness:0.6 })
);
box.position.y = 0.09; scene.add(box);
scene.add(new THREE.AxesHelper(0.6));

function resize(){
  const w = cont.clientWidth||window.innerWidth, h = cont.clientHeight||520;
  renderer.setSize(w,h); camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();
(function loop(){ controls.update(); renderer.render(scene,camera); requestAnimationFrame(loop); })();

/* ====== Mapeo fijo (YZX) ====== */
function reorderYZX([x,y,z,w]) { return [y,z,x,w]; }

/* ====== Corrección a cero (autocalibración) ======
   Guardamos q0 = (primer quat mapeado)^-1 y aplicamos:
   q_final = q0 * q_mapeado
   Así la primera pose siempre se ve como (0,0,0). */
let q0 = null;             // corrección (inversa del primer quat)
let lastMappedQ = null;    // para "Recentrar" bajo demanda

const st = document.getElementById('status');
const qEl = document.getElementById('q');
const eulerEl = document.getElementById('euler');
const btnReset = document.getElementById('btnReset');
btnReset.onclick = () => {
  if (lastMappedQ) {
    q0 = lastMappedQ.clone().invert();   // nueva referencia = cero
  }
};

/* ====== WebSocket & datos ====== */
const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onopen  = ()=> st.textContent = 'Conectado';
ws.onclose = ()=> st.textContent = 'Desconectado';
ws.onerror = ()=> st.textContent = 'Error';

ws.onmessage = (ev)=>{
  try{
    const m = JSON.parse(ev.data);
    if(!m || !m.quat) return;

    // 1) mapeo YZX
    const [x,y,z,w] = reorderYZX(m.quat);
    const qMapped = new THREE.Quaternion(x,y,z,w);
    lastMappedQ = qMapped.clone();

    // 2) inicializar q0 la primera vez (cero al inicio)
    if (!q0) q0 = qMapped.clone().invert();

    // 3) aplicar corrección: q_final = q0 * qMapped
    const qFinal = q0.clone().multiply(qMapped);
    box.quaternion.copy(qFinal);

    // 4) textos
    qEl.textContent = 'quat: ['+ m.quat.map(v=>Number(v).toFixed(6)).join(', ') +']';
    const e = new THREE.Euler().setFromQuaternion(qFinal, 'XYZ', true);
    const roll  = THREE.MathUtils.radToDeg(e.x);
    const pitch = THREE.MathUtils.radToDeg(e.y);
    const yaw   = THREE.MathUtils.radToDeg(e.z);
    eulerEl.textContent = `roll=${roll.toFixed(1)}°, pitch=${pitch.toFixed(1)}°, yaw=${yaw.toFixed(1)}°`;
  }catch{}
};
</script>
</html>
